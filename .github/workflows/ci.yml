name: CI

on:
  pull_request:
    branches:
      - devel
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    name: Build, test, and package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build extension
        run: npm run build

      - name: Typecheck
        run: npm run typecheck

      - name: Run tests
        run: npm test

      - name: Create Chrome Web Store package
        run: npm run package:cws

      - name: Verify Chrome Web Store package
        run: npm run verify:cws
